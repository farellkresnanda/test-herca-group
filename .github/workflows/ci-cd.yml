name: 🚀 CI/CD Laravel + Vite

on:
  push:
    branches:
      - "*"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: Docker-Test

    steps:
      - name: 📦 Checkout Code
        uses: actions/checkout@v4

      - name: 🔐 Docker Login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: 🛠 Build Backend Docker Image (Laravel)
        run: docker build -t kresnandaf/herca-backend:latest ./backend

      - name: 🛠 Build Frontend Docker Image (Vite)
        run: docker build -t kresnandaf/herca-frontend:latest ./frontend

      - name: 📤 Push Docker Images
        run: |
          docker push kresnandaf/herca-backend:latest
          docker push kresnandaf/herca-frontend:latest

      - name: 🚢 Deploy to VPS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.BE_PORT }}
          script: |
            echo "🔁 Pulling latest Docker images..."
            docker pull kresnandaf/herca-backend:latest
            docker pull kresnandaf/herca-frontend:latest

            echo "🛑 Stop and remove old containers if exist"
            docker stop herca-backend || true && docker rm herca-backend || true
            docker stop herca-frontend || true && docker rm herca-frontend || true

            echo "🚀 Run Laravel Backend"
            docker run -d \
              --name herca-backend \
              --restart unless-stopped \
              -p ${{ secrets.BE_PORT }}:8000 \
              kresnandaf/herca-backend:latest

            echo "🚀 Run Vite Frontend"
            docker run -d \
              --name herca-frontend \
              --restart unless-stopped \
              -p ${{ secrets.FE_PORT }}:3000 \
              kresnandaf/herca-frontend:latest

            echo "🧹 Clean unused Docker data"
            docker system prune -f

            echo "✅ Deployment finished successfully!"

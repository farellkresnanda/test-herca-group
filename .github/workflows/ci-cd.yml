name: 🚀 CI/CD Laravel + Vite

on:
  push:
    branches:
      - "*"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: Development

    steps:
      - name: 📦 Checkout Code
        uses: actions/checkout@v4

      - name: 🔐 Docker Login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: 🛠 Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/pakuwon-fe-dev:latest .

      - name: 📤 Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/pakuwon-fe-dev:latest

      - name: 🚢 Deploy to VPS Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "🔁 Pulling latest Docker image..."
            docker pull ${{ secrets.DOCKER_USERNAME }}/pakuwon-fe-dev:latest

            echo "🛑 Stopping and removing old container (if exists)..."
            docker stop pakuwon-fe-dev || true
            docker rm pakuwon-fe-dev || true

            echo "🚀 Running new container..."
            docker run -d \
              --name pakuwon-fe-dev \
              --restart unless-stopped \
              -p ${{ secrets.BE_PORT }}:9000 \
              -v /etc/herca/.env:/var/www/herca/.env \
              ${{ secrets.DOCKER_USERNAME }}/pakuwon-fe-dev:latest

            echo "✅ Deployment complete!"
